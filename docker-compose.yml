services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - mongo-init
      - redis-master
    networks:
      - supermercado-net

  shard0-primary:
    image: mongo:6.0
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - shard0-data:/data/db
    networks:
      - supermercado-net

  shard1-primary:
    image: mongo:6.0
    command: ["--replSet", "rs1", "--bind_ip_all", "--port", "27019"]
    ports:
      - "27019:27019"
    volumes:
      - shard1-data:/data/db
    networks:
      - supermercado-net

  mongo-init:
    image: mongo:6.0
    depends_on:
      - shard0-primary
      - shard1-primary
    networks:
      - supermercado-net
    restart: "no"
    command: >
      sh -c "
        sleep 8 &&
        mongosh --host shard0-primary:27017 --eval 'rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"shard0-primary:27017\"}]})' 2>/dev/null; echo 'Shard 0 OK' &&
        mongosh --host shard1-primary:27019 --eval 'rs.initiate({_id:\"rs1\",members:[{_id:0,host:\"shard1-primary:27019\"}]})' 2>/dev/null; echo 'Shard 1 OK'
      "

  frontend:
    image: node:20-slim
    working_dir: /app/frontend
    volumes:
      - ./:/app
    ports:
      - "8001:5173"
    command: >
      sh -c "npm install && npm run dev"
    depends_on:
      - api
    networks:
      - supermercado-net

  redis-master:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis-master-data:/data
    networks:
      - supermercado-net

  redis-replica:
    image: redis:7
    command: ["redis-server", "--replicaof", "redis-master", "6379"]
    depends_on:
      - redis-master
    networks:
      - supermercado-net

networks:
  supermercado-net:
    driver: bridge

volumes:
  shard0-data:
  shard1-data:
  redis-master-data:
